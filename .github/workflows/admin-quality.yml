name: Admin dashboard quality

on:
  pull_request:
    paths:
      - "src/app/admin/**"
      - "src/app/api/admin/**"
      - "src/lib/admin-api.ts"
      - "package.json"
      - "package-lock.json"
      - "docs/admin-dashboard-quality.md"
      - ".github/workflows/admin-quality.yml"
  workflow_dispatch:

jobs:
  quality-admin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run admin quality gate
        run: npm run quality:admin
